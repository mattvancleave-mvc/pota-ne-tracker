name: Nebraska POTA Tracker

on:
  schedule:
    - cron: "0 14 * * *"   # runs daily at 14:00 UTC (~9 AM Nebraska)
  workflow_dispatch:       # allows manual run

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Download repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python pota_tracker.py
